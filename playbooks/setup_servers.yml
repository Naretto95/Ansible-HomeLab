---

- name: Bootstrap cluster nodes (DNS, repos, packages)
  hosts: cluster
  gather_facts: false
  roles:
    - common/os_detect
    - common/dns_setup
    - common/bootstrap
    - common/repositories
    - common/packages

- name: Applying basic configuration
  hosts: cluster
  roles:
    - infrastructure/power_policy
    - infrastructure/gpu_manager
    - infrastructure/proxmox_customizations
    - infrastructure/proxmox_cluster