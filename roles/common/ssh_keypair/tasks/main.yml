---

- name: Ensure .ssh directory exists
  file:
    path: "{{ ssh_key_path | dirname }}"
    state: directory
    mode: "0700"

- name: Generate SSH keypair if missing (or forced)
  command: >
    ssh-keygen -t {{ ssh_key_type }}
    -N ''
    -f {{ ssh_key_path }}
  args:
    creates: "{{ ssh_key_path }}"

- name: Read SSH public key
  slurp:
    src: "{{ ssh_key_path }}.pub"
  register: ssh_pub

- name: Expose ssh public key as fact
  set_fact:
    ssh_public_key: "{{ ssh_pub.content | b64decode }}"