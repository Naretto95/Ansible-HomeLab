---

- name: Normalize role guard inputs
  ansible.builtin.set_fact:
    required_group_list: "{{ (required_group | default([])) | list }}"
    required_os_list: "{{ (required_os | default([])) | list }}"
    states_list: "{{ (states | default([])) | list }}"

- name: Fail if host is not in required groups
  ansible.builtin.fail:
    msg: "Host must be in one of: {{ required_group_list }}"
  when:
    - required_group_list | length > 0
    - (group_names | intersect(required_group_list)) | length == 0

- name: Fail if OS is not allowed
  ansible.builtin.fail:
    msg: "OS '{{ os_family }}' not allowed. Allowed: {{ required_os_list }}"
  when:
    - required_os_list | length > 0
    - (os_family | lower) not in (required_os_list | map('lower') | list)

- name: Validate states
  ansible.builtin.assert:
    that:
      - states_list | difference(['present', 'absent']) | length == 0
    fail_msg: "Invalid states: {{ states_list }} (allowed: present, absent)"
  when:
    - states_list | length > 0