---

- name: Add APT repositories (deb822)
  ansible.builtin.deb822_repository:
    name: "{{ repo.filename }}"
    types: "{{ item.types }}"
    uris: "{{ repo.uris }}"
    suites: "{{ repo.suites }}"
    enabled: true
    components: "{{ repo.components }}"
    signed_by: "/usr/share/keyrings/{{ item.filename }}.gpg"
    state: "{{ repos_state }}"
