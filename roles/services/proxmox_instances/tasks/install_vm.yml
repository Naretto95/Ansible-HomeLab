---

- block:

    - name: Ensure SSH keypair exists
      include_role:
        name: common/ssh_keypair

    - name: Create VM on Proxmox
      community.proxmox.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ ansible_user }}@pam"
        api_password: "{{ ansible_password }}"
        clone: "{{ vm.template }}"
        newid: "{{ vm.id }}"
        name: "{{ vm.name }}"
        node: "{{ proxmox_node }}"
        full: true
        state: present

    - name: Configure VM on Proxmox
      community.proxmox.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ ansible_user }}@pam"
        api_password: "{{ ansible_password }}"
        vmid: "{{ vm.id }}"
        node: "{{ proxmox_node }}"
        ciuser: "{{ vm.cloud_user }}"
        cipassword: "{{ vm.cloud_password }}"
        sshkeys: "{{ ssh_public_key }}"
        cores: "{{ vm.cores }}"
        scsi: "{{ vm.scsi }}"
        memory: "{{ vm.memory }}"
        net:
          net0: "virtio,bridge={{ vm.net_bridge }}"
        ipconfig:
          ipconfig0: "ip={{ vm.net_ip_address }}/{{ vm.net_subnet }},gw={{ vm.net_gateway }}"
        update: true
        update_unsafe: true

    - name: Start VM
      community.proxmox.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ ansible_user }}@pam"
        api_password: "{{ ansible_password }}"
        vmid: "{{ vm.id }}"
        node: "{{ proxmox_node }}"
        state: started

    - name: Wait for SSH to become available on VM
      ansible.builtin.wait_for:
        host: "{{ vm.net_ip_address }}"
        port: 22
        delay: 10
        timeout: 300

  delegate_to: localhost

- block:

    - name: Enable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication\s+'
        line: 'PasswordAuthentication yes'
        backup: true
    
    - name: Ensure UsePAM is enabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?UsePAM\s+'
        line: 'UsePAM yes'

    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
  
  delegate_to: "{{ vm.net_ip_address }}"
  vars:
    ansible_user: "{{ vm.cloud_user }}"
    ansible_password: "{{ vm.cloud_password }}"
    ansible_become: true
    ansible_become_password: "{{ vm.cloud_password }}"

- name: Make sure SSH Key is removed from VM
  community.proxmox.proxmox_kvm:
    api_host: "{{ ansible_host }}"
    api_user: "{{ ansible_user }}@pam"
    api_password: "{{ ansible_password }}"
    vmid: "{{ vm.id }}"
    node: "{{ proxmox_node }}"
    delete: "sshkeys"
    update: true
    update_unsafe: true
  delegate_to: localhost