---

- name: Read runtime.txt
  ansible.builtin.slurp:
    src: "{{ django_app_dir }}/runtime.txt"
  register: runtime_file
  ignore_errors: true
  failed_when: false

- block:

    - name: Set raw python version from runtime.txt
      ansible.builtin.set_fact:
        python_runtime: >-
          {{ (runtime_file.content | b64decode).strip() }}

    - name: Normalize python version (major.minor only)
      ansible.builtin.set_fact:
        python_version: >-
          {{
            (python_runtime.split('-')[1] if 'python-' in python_runtime else python_runtime)
            .rsplit('.', 1)[0]
          }}

  when: runtime_file is defined and runtime_file.content is defined

- name: Install python {{ python_version }} with pyenv
  ansible.builtin.command:
    cmd: "pyenv install -s {{ python_version }}"
  changed_when: false
  
- name: Catch python binary
  ansible.builtin.shell:
    cmd: |
      eval "$(pyenv init -)"
      echo $(pyenv shell {{ python_version }}; pyenv which python)
  register: python_binary
  changed_when: false

- name: Create virtualenv
  ansible.builtin.pip:
    virtualenv: "{{ venv_dir }}"
    virtualenv_command: "{{ python_binary.stdout }} -m venv"
    name: pip
    state: present

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ django_app_dir }}/requirements.txt"
    virtualenv: "{{ venv_dir }}"

- name: Create .env file
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ django_app_dir }}/.env"
    owner: root
    group: root
    mode: "0600"

- name: Run Django makemigrations
  ansible.builtin.command:
    cmd: "{{ venv_dir }}/bin/python manage.py makemigrations"
    chdir: "{{ django_app_dir }}"

- name: Run Django migrate
  ansible.builtin.command:
    cmd: "{{ venv_dir }}/bin/python manage.py migrate"
    chdir: "{{ django_app_dir }}"

- name: Run Django collectstatic
  ansible.builtin.command:
    cmd: "{{ venv_dir }}/bin/python manage.py collectstatic --noinput"
    chdir: "{{ django_app_dir }}"

- name: Create Django superuser (if not exists)
  ansible.builtin.shell: |
    {{ venv_dir }}/bin/python manage.py shell << EOF
    from django.contrib.auth import get_user_model

    User = get_user_model()

    username = "{{ django_superuser_username }}"
    email = "{{ django_email }}"
    password = "{{ django_superuser_password }}"

    if not User.objects.filter(username=username).exists():
        User.objects.create_superuser(username, email, password)
        print("created")
    else:
        print("exists")
    EOF
  args:
    chdir: "{{ django_app_dir }}"
  register: superuser_result
  changed_when: "'created' in superuser_result.stdout"

- name: Install systemd service
  ansible.builtin.template:
    src: gunicorn.service.j2
    dest: "/etc/systemd/system/{{ django_app_name }}.service"

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start service
  ansible.builtin.systemd:
    name: "{{ django_app_name }}"
    enabled: true
    state: restarted

- name: Create nginx site config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/{{ django_app_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Enable nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ django_app_name }}"
    dest: "/etc/nginx/sites-enabled/{{ django_app_name }}"
    state: link

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Ensure nginx is running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: restarted