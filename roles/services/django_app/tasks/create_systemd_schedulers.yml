---

- name: Create systemd service file
  ansible.builtin.template:
    src: systemd.service.j2
    dest: "/etc/systemd/system/{{ scheduler.name }}.service"
    owner: root
    group: root
    mode: "0644"

- name: Create systemd timer file
  ansible.builtin.template:
    src: systemd.timer.j2
    dest: "/etc/systemd/system/{{ scheduler.name }}.timer"
    owner: root
    group: root
    mode: "0644"