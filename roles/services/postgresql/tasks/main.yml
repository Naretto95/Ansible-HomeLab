---

- name: Ensure PostgreSQL is running
  service:
    name: postgresql
    state: started
    enabled: true

- name: Get installed PostgreSQL version
  ansible.builtin.shell: |
    ls /etc/postgresql
  register: pg_versions
  changed_when: false

- name: Set PostgreSQL version fact
  ansible.builtin.set_fact:
    postgresql_version: "{{ pg_versions.stdout_lines | sort | last }}"

- name: Configure listen_addresses
  lineinfile:
    path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
    regexp: '^#?listen_addresses'
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: restart postgresql

- name: Find pg_hba.conf
  find:
    paths: /etc/postgresql
    patterns: pg_hba.conf
    recurse: true
  register: pg_hba_file

- name: Configure pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: "{{ pg_hba_file.files[0].path }}"
  notify: restart postgresql

- name: Flush handlers
  meta: flush_handlers

- name: Create database user
  become: true
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ postgresql_db_user }}"
    password: "{{ postgresql_db_password }}"
    state: present

- name: Create database
  become: true
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ postgresql_db_name }}"
    owner: "{{ postgresql_db_user }}"
    encoding: UTF8
    state: present