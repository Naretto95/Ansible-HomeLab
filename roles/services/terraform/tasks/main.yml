---

- name: Gather services definitions from services
  set_fact:
    lxc_containers: "{{ services | select('in', groups['lxc_containers']) | map('extract', hostvars, 'lxc_container') | select('defined') | list }}"
    virtual_machines: "{{ services | select('in', groups['virtual_machines']) | map('extract', hostvars, 'virtual_machine') | select('defined') | list }}"

- name: Stop role if no lxc_containers or virtual_machines
  meta: end_role
  when: lxc_containers | length == 0 and virtual_machines | length == 0

- name: Get existing Proxmox VMs
  ansible.builtin.command: qm list
  register: qm_list
  changed_when: false

- name: Get existing Proxmox LXCs
  ansible.builtin.command: pct list
  register: pct_list
  changed_when: false

- name: Parse existing VM/LXC IDs
  set_fact:
    existing_vms: "{{ qm_list.stdout_lines[1:] | map('split') | map('first') | map('int') | list }}"
    existing_lxcs: "{{ pct_list.stdout_lines[1:] | map('split') | map('first') | map('int') | list }}"

- name: Filter services that do not exist yet
  set_fact:
    virtual_machines: "{{ virtual_machines | rejectattr('id', 'in', existing_vms) | list }}"
    lxc_containers: "{{ lxc_containers | rejectattr('id', 'in', existing_lxcs) | list }}"

- block:

    - name: Ensure LXC template is present
      ansible.builtin.command: "pveam download local {{ item.template | regex_replace('^local:vztmpl/', '') }}"
      args:
        creates: "/var/lib/vz/template/cache/{{ item.template | regex_replace('^local:vztmpl/', '') }}"
      changed_when: false
      loop: "{{ lxc_containers }}"

    - name: Ensure VM image is present
      ansible.builtin.get_url:
        url: "{{ item.image }}"
        dest: "/var/lib/vz/template/cache/{{ item.image | basename }}"
        mode: "0644"
        timeout: 300
      loop: "{{ virtual_machines }}"
      
  when: services_state == 'present'

- block:

    - name: Clear old Terraform files
      file:
        path: "/tmp/terraform/{{ ansible_host }}"
        state: absent

    - name: Ensure destination directory exists
      file:
        path: "/tmp/terraform/{{ ansible_host }}"
        state: directory
        mode: '0755'

    - name: Generate Terraform provider file
      template:
        src: provider.tf.j2
        dest: "/tmp/terraform/{{ ansible_host }}/provider.tf"

    - name: Generate terraform templates of containers
      template:
        src: "templates/container.tf.j2"
        dest: "/tmp/terraform/{{ ansible_host }}/{{ item.name }}.tf"
      loop: "{{ lxc_containers }}"

    - name: Generate terraform templates of virtual_machines
      template:
        src: "templates/virtual_machine.tf.j2"
        dest: "/tmp/terraform/{{ ansible_host }}/{{ item.name }}.tf"
      loop: "{{ virtual_machines }}"

    - name: Initialize and apply Terraform configuration
      community.general.terraform:
        project_path: "/tmp/terraform/{{ ansible_host }}"
        state: present
        force_init: yes
  delegate_to: localhost