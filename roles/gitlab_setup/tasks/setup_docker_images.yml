---

- name: Set Git repository registry fact
  set_fact:
    git_repo_registry: "localhost:5050/{{ git_repo.path_with_namespace }}"

- name: Log in to GitLab container registry using token
  community.docker.docker_login:
    registry_url: "localhost:5050"
    username: "oauth2"
    password: "{{ gitlab_token }}"

- name: Build Docker image
  community.docker.docker_image:
    name: "{{ git_repo_registry }}/{{ item.name }}"
    tag: "{{ item.tag }}"
    build:
      path: "{{ base_directory }}/{{ item.name }}"
      dockerfile: DockerFile
      pull: yes
    source: build
  loop: docker_images

- name: Push Docker image to GitLab registry
  community.docker.docker_image:
    name: "{{ git_repo_registry }}/{{ item.name }}"
    tag: "{{ item.tag }}"
    push: yes
  loop: docker_images

- name: Logout from GitLab registry
  community.docker.docker_login:
    registry_url: "{{ gitlab_registry_url }}"
    state: absent