- name: Validate container_state
  assert:
    that:
      - container_state is not defined or container_state == 'absent'
    fail_msg: "container_state can only be 'absent' or undefined (defaulting to present)."

- name: Ensure Docker networks exist or remove it
  community.docker.docker_network:
    name: "{{ item.key }}"
    driver: bridge
    state: "{{ container_state | default('present') }}"
  loop: "{{ docker_networks | dict2items }}"
  when: docker_networks is defined

- name: Create containers in user's base directory or remove them
  include_tasks: container.yml
  loop: "{{ docker_services | default([]) }}"
  loop_control:
    loop_var: container