---

- name: Check if cluster config exists
  stat:
    path: /etc/pve/corosync.conf
  register: corosync_conf

- name: Create cluster if not already present
  command: pvecm create {{ cluster_name }}
  when: not corosync_conf.stat.exists

- name: Set expected votes to 1 for 2-node cluster
  ansible.builtin.command: pvecm expected 1
  notify: restart corosync