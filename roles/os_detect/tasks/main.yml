---

- name: Show contents of credentials.yml
  command: cat ../../inventory/group_vars/cluster/credentials.yml
  register: creds_file
  ignore_errors: true

- name: Debug credentials file
  debug:
    var: creds_file.stdout_lines

- name: Detect Debian/Proxmox using /etc/debian_version
  raw: |
    if [ -f /etc/pve/.version ]; then
      echo Proxmox
    elif [ -f /etc/debian_version ]; then
      echo Debian
    else
      echo Other
    fi
  register: os_name
  changed_when: false

- set_fact:
    os_family: "{{ os_name.stdout | trim }}"