---

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web"'
    - when: never

default:
  image: gitlab.local:5050/root/ansible-homelab/ansible-image:latest
  tags:
    - ansible
    - automation
  before_script:
    - chmod -R o-w .
    - chmod +x ./scripts/setup_vars.sh
    - ./scripts/setup_vars.sh
    - ansible-galaxy collection install -r requirements.yml

stages:
  - setup_infra
  - deploy_services
  - deploy_django

setup_infra:
  stage: setup_infra
  script:
    - echo "[INFO] Starting Ansible playbook for infrastructure"
    - ansible-playbook -i inventory/hosts.ini playbooks/setup_servers.yml -v
  rules:
    - if: '$setup_infra == "true"'
      when: on_success

deploy_services:
  stage: deploy_services
  script:
    - echo "[INFO] Starting Ansible playbook for services"
    - ansible-playbook -i inventory/hosts.ini playbooks/deploy_services.yml -v
  rules:
    - if: '$deploy_services == "true"'
      when: on_success

deploy_django:
  stage: deploy_django
  script:
    - echo "[INFO] Starting Ansible playbook for django"
    - ansible-playbook -i inventory/hosts.ini playbooks/deploy_django.yml -v
  rules:
    - if: '$deploy_django == "true"'
      when: on_success