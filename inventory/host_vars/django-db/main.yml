---

ansible_host: 192.168.1.96
target_host: server2

postgresql_listen_addresses: "*"

# Allow only the Django application server
postgresql_allowed_networks:
  - "192.168.1.95/32"

virtual_machine:
  name: django-db
  id: 102
  template: debian-13
  cores: 2
  memory: 4096
  scsi:
    scsi1:  "local-lvm:40,size=40G"
  storage: "local-lvm"
  net_bridge: "vmbr0"
  net_ip_address: "{{ ansible_host }}"
  net_subnet: 24
  net_gateway: "{{ net_gateway }}"
  cloud_user: "{{ ansible_user }}"
  cloud_password: "{{ ansible_password }}"
  users:
    - name: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      sudo: true
