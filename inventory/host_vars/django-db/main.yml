---

ansible_host: 192.168.1.96
target_host: server2

postgresql_listen_addresses: "*"

# Allow only the Django application server
postgresql_allowed_networks:
  - "192.168.1.95/32"

virtual_machine:
  name: django-db
  id: 102
  template: debian-13
  cores: 4
  memory: 8192
  scsi:
    scsi1:  "local-lvm:50,size=50G"
  storage: "local-lvm"
  net_bridge: "vmbr0"
  net_ip_address: "{{ ansible_host }}"
  net_subnet: 24
  net_gateway: "{{ net_gateway }}"
  cloud_user: "{{ ansible_user }}"
  cloud_password: "{{ ansible_password }}"
  users:
    - name: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      sudo: true
  storage_disks:
    - device: /dev/sda
      label: gpt
      partitions:
        - number: 1
          name: postgres
          size: 100%
          vg: vg_postgres
          lvs:
            - name: lv_pgdata
              size: 45G
              filesystem: ext4
              mount: /var/lib/postgresql
            - name: lv_logs
              size: 99%FREE
              filesystem: ext4
              mount: /var/log